<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout - The Boutique</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Noto+Serif:wght@500;600;700;900&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#636564",
                        "surface-container": "#eeeeee",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#0035be",
                        "error-container": "#ffdad6",
                        "tertiary": "#993100",
                        "inverse-primary": "#b8c3ff",
                        "secondary-container": "#e2e2e2",
                        "on-error-container": "#93000a",
                        "background": "#f9f9f9",
                        "secondary": "#5d5f5e",
                        "on-primary-fixed": "#001356",
                        "primary-fixed": "#dde1ff",
                        "outline": "#747688",
                        "on-tertiary-fixed-variant": "#812800",
                        "inverse-surface": "#2f3131",
                        "on-secondary-fixed": "#1a1c1c",
                        "on-secondary-fixed-variant": "#454747",
                        "secondary-fixed": "#e2e2e2",
                        "surface-tint": "#124af0",
                        "on-primary-container": "#efefff",
                        "surface-container-highest": "#e2e2e2",
                        "inverse-on-surface": "#f1f1f1",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c4c5d9",
                        "on-surface-variant": "#434656",
                        "surface-container-low": "#f3f3f3",
                        "on-tertiary-container": "#ffece6",
                        "on-tertiary-fixed": "#380d00",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#c6c6c6",
                        "surface-container-high": "#e8e8e8",
                        "surface": "#f9f9f9",
                        "on-surface": "#1a1c1c",
                        "tertiary-fixed": "#ffdbcf",
                        "primary-container": "#2e5bff",
                        "surface-variant": "#e2e2e2",
                        "on-background": "#1a1c1c",
                        "tertiary-container": "#c24100",
                        "tertiary-fixed-dim": "#ffb59b",
                        "on-primary": "#ffffff",
                        "surface-dim": "#dadada",
                        "on-secondary": "#ffffff",
                        "surface-bright": "#f9f9f9",
                        "primary-fixed-dim": "#b8c3ff",
                        "on-error": "#ffffff",
                        "primary": "#0040e0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "stack-md": "32px",
                        "margin-x": "48px",
                        "base": "8px",
                        "container-max": "1440px",
                        "stack-sm": "16px",
                        "stack-lg": "64px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "button": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "h2": ["Noto Serif"],
                        "h3": ["Noto Serif"],
                        "h1": ["Noto Serif"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "600" }],
                        "button": ["14px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400" }],
                        "h2": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "h3": ["32px", { "lineHeight": "1.3", "letterSpacing": "0em", "fontWeight": "500" }],
                        "h1": ["64px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Custom styles for sharp edges enforced globally per rules */
        input[type="text"], input[type="email"], input[type="tel"], select {
            border-radius: 0 !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Distraction-Free Header (Transactional) -->
<header class="w-full border-b border-on-surface bg-surface py-4 flex justify-center items-center sticky top-0 z-50">
<h1 class="font-h3 text-h3 text-on-surface uppercase tracking-tight">THE BOUTIQUE</h1>
</header>
<!-- Main Checkout Content -->
<main class="flex-grow w-full max-w-[600px] mx-auto px-4 py-8 md:py-stack-lg">
<!-- Order Summary Snippet -->
<div class="mb-stack-md pb-4 border-b border-outline-variant flex justify-between items-end">
<div>
<span class="font-label-caps text-label-caps text-secondary block mb-1">Order Total</span>
<span class="font-h3 text-h3 text-on-background">$1,240.00</span>
</div>
<button class="font-label-caps text-label-caps text-primary-container hover:underline underline-offset-4 uppercase flex items-center gap-1">
                Show Details <span class="material-symbols-outlined text-[16px]">expand_more</span>
</button>
</div>
<!-- Accordion Container -->
<div class="w-full flex flex-col border-t border-on-surface">
<!-- STEP 1: CONTACT (Completed State) -->
<div class="border-b border-on-surface w-full bg-surface-bright flex flex-col">
<div class="py-6 px-2 flex justify-between items-center cursor-pointer group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<h2 class="font-h3 text-h3 text-on-surface">1. Contact</h2>
</div>
<span class="font-label-caps text-label-caps text-secondary uppercase group-hover:text-primary-container transition-colors">Edit</span>
</div>
<!-- Collapsed Content Summary -->
<div class="px-2 pb-6 pl-10 flex flex-col gap-1">
<p class="font-body-md text-body-md text-on-surface-variant">client@example.com</p>
<p class="font-body-md text-body-md text-on-surface-variant">+1 (555) 123-4567</p>
</div>
</div>
<!-- STEP 2: SHIPPING (Active State) -->
<div class="border-b border-on-surface w-full bg-surface flex flex-col relative overflow-hidden">
<!-- Active Indicator Line -->
<div class="absolute left-0 top-0 bottom-0 w-1 bg-primary-container"></div>
<div class="py-6 px-4 pl-6 flex justify-between items-center">
<h2 class="font-h3 text-h3 text-on-surface">2. Shipping</h2>
</div>
<!-- Expanded Content Form -->
<div class="px-4 pl-6 pb-8 flex flex-col gap-stack-sm">
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="firstName">First Name</label>
<input class="w-full border border-on-surface bg-transparent p-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="firstName" type="text" value="Jane"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="lastName">Last Name</label>
<input class="w-full border border-on-surface bg-transparent p-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="lastName" type="text" value="Doe"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="address">Address</label>
<input class="w-full border border-on-surface bg-transparent p-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="address" placeholder="Street address or P.O. Box" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="apartment">Apt, Suite, etc. (Optional)</label>
<input class="w-full border border-on-surface bg-transparent p-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="apartment" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="city">City</label>
<input class="w-full border border-on-surface bg-transparent p-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="city" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="state">State</label>
<select class="w-full border border-on-surface bg-transparent p-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors appearance-none rounded-none" id="state">
<option>NY</option>
<option>CA</option>
<option>TX</option>
</select>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="zip">Zip Code</label>
<input class="w-full border border-on-surface bg-transparent p-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="zip" type="text"/>
</div>
</div>
</div>
<!-- Shipping Method Selection (Simulated minimalist radio buttons) -->
<div class="mt-4 flex flex-col gap-4">
<h3 class="font-label-caps text-label-caps text-on-surface uppercase border-b border-outline-variant pb-2">Shipping Method</h3>
<label class="flex items-center justify-between p-4 border border-primary-container bg-surface-container-lowest cursor-pointer">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">radio_button_checked</span>
<div class="flex flex-col">
<span class="font-body-md text-body-md text-on-surface font-semibold">Standard Delivery</span>
<span class="font-body-md text-body-md text-on-surface-variant text-sm">3-5 Business Days</span>
</div>
</div>
<span class="font-body-md text-body-md text-on-surface">Free</span>
</label>
<label class="flex items-center justify-between p-4 border border-outline-variant hover:border-on-surface cursor-pointer transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline">radio_button_unchecked</span>
<div class="flex flex-col">
<span class="font-body-md text-body-md text-on-surface">Express Delivery</span>
<span class="font-body-md text-body-md text-on-surface-variant text-sm">1-2 Business Days</span>
</div>
</div>
<span class="font-body-md text-body-md text-on-surface">$25.00</span>
</label>
</div>
<!-- CTA -->
<button class="mt-6 w-full bg-primary-container text-on-primary py-4 px-6 font-button text-button rounded-full uppercase tracking-wider hover:bg-primary-fixed-variant transition-colors duration-200 flex justify-center items-center gap-2">
                        Continue to Payment <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</div>
<!-- STEP 3: PAYMENT (Inactive State) -->
<div class="border-b border-on-surface w-full bg-surface-container-low flex flex-col opacity-60 pointer-events-none">
<div class="py-6 px-2 flex justify-between items-center">
<h2 class="font-h3 text-h3 text-secondary">3. Payment</h2>
<span class="material-symbols-outlined text-outline">lock</span>
</div>
</div>
</div>
</main>
<!-- Minimal Trust Footer -->
<footer class="w-full py-8 border-t border-outline-variant bg-surface flex flex-col items-center justify-center gap-4">
<div class="flex items-center gap-4 text-secondary">
<span class="material-symbols-outlined text-[24px]">lock</span>
<span class="font-label-caps text-label-caps uppercase">Secure Encrypted Checkout</span>
</div>
</footer>
</body></html>
